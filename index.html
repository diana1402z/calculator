<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор доставки — Захарчук Діана</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        .info {
            font-size: 0.9em;
            color: #7f8c8d;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #219150;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f6ef;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            color: #27ae60;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info">
        Виконав: <strong>Захарчук Діана</strong> | Група: <strong>4-11</strong>
    </div>
    
    <h2>Калькулятор доставки</h2>

    <label for="city">Оберіть місто:</label>
    <select id="city">
        <option value="Kyiv">Київ</option>
        <option value="Lviv">Львів</option>
        <option value="Odesa">Одеса</option>
        <option value="Kharkiv">Харків</option>
        <option value="Dnipro">Дніпро</option>
    </select>

    <label for="weight">Вага вантажу (кг):</label>
    <input type="number" id="weight" placeholder="Введіть вагу" min="0.1" step="0.1">

    <label for="type">Тип доставки:</label>
    <select id="type">
        <option value="standard">Стандартна (1.0x)</option>
        <option value="express">Експрес (1.5x)</option>
        <option value="courier">Кур'єр до дверей (2.0x)</option>
    </select>

    <button onclick="calculateDelivery()">Розрахувати вартість</button>

    <div id="result" class="result"></div>
</div>

<script>
    // Масив з тарифами для міст (базова вартість)
    const cityTariffs = [
        { name: "Kyiv", price: 50 },
        { name: "Lviv", price: 70 },
        { name: "Odesa", price: 65 },
        { name: "Kharkiv", price: 75 },
        { name: "Dnipro", price: 60 }
    ];

    // Коефіцієнти для типів доставки
    const deliveryTypes = {
        standard: 1,
        express: 1.5,
        courier: 2
    };

    function calculateDelivery() {
        const cityValue = document.getElementById('city').value;
        const weight = parseFloat(document.getElementById('weight').value);
        const typeValue = document.getElementById('type').value;
        const resultDiv = document.getElementById('result');

        if (isNaN(weight) || weight <= 0) {
            alert("Будь ласка, введіть коректну вагу!");
            return;
        }

        // Знаходимо базовий тариф для обраного міста
        const cityData = cityTariffs.find(c => c.name === cityValue);
        const basePrice = cityData.price;

        // Логіка розрахунку: (Базовий тариф міста + (вага * 10)) * коефіцієнт типу
        const weightCost = weight * 10;
        const typeMultiplier = deliveryTypes[typeValue];
        
        const totalPrice = (basePrice + weightCost) * typeMultiplier;

        // Виведення результату
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `Вартість доставки: ${totalPrice.toFixed(2)} грн`;
    }
</script>

</body>
</html>
